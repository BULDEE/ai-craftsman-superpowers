# AI Craftsman Superpowers - Default Configuration
# This file is copied to ~/.claude/.craft-config.yml on first run
# Users can customize it freely

version: "2.1"

# User profile (configured by setup wizard)
profile:
  name: ""
  disc_type: ""  # D, I, S, C, DI, DC, IS, SC
  biases: []     # acceleration, dispersion, scope_creep, over_optimize

# Packs activation
packs:
  core: true      # Always true (required)
  symfony: false  # Enable for PHP/Symfony projects
  react: false    # Enable for React/TypeScript projects

# Stack versions (used by scaffold and code generation)
stack:
  php_version: "8.4"
  symfony_version: "7.4"
  node_version: "22"
  react_version: "19"

# Rule overrides (per-rule severity: block, warn, ignore)
# Builtin rules: PHP001-005, TS001-003, LAYER001-003, WARN-PHP001, WARN-TS001
# Custom rules use long form with pattern, message, severity, languages
rules:
  # Examples (uncomment to customize):
  # PHP001: block         # declare(strict_types=1) required
  # PHP002: warn          # downgrade final class to warning
  # TS001: ignore         # disable no-any check
  #
  # CUSTOM001:
  #   pattern: "dd\\("
  #   message: "No dd() in production code"
  #   severity: block
  #   languages: [php]

# Channel configuration (Sentry, etc.)
channels:
  sentry:
    circuit_threshold: 3       # failures before circuit opens
    circuit_cooldown: 300      # seconds in open state
    cache_ttl: 3600            # cache TTL in seconds
    cache_max_entries: 200     # max cached items

# Quality gates (commands to run)
quality:
  pre_commit:
    - "make phpstan"
    - "make test-unit"
  pre_pr:
    - "make quality"

# Project paths (relative to project root)
# Override per-project in project's .craft-config.yml
paths:
  domain: "src/Domain"
  application: "src/Application"
  infrastructure: "src/Infrastructure"
  presentation: "src/Presentation"
  tests_unit: "tests/Unit"
  tests_integration: "tests/Integration"
  tests_functional: "tests/Functional"
