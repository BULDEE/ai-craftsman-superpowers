name: ai-ml
version: "1.0.0"
description: "AI/ML craftsman pack — RAG pipelines, LLM integration, prompt engineering, MLOps"
compatibility:
  core: ">=2.4.0"
  stack: ["*"]

rules:
  builtin: []
  static_analysis: []

hooks:
  validators: []

commands:
  scaffold_types: []

agents: ["agents/ai-engineer.md"]

knowledge: ["knowledge/"]

mcpServers:
  knowledge-rag:
    type: stdio
    command: node
    args: ["mcp/knowledge-rag/dist/src/index.js"]
    env:
      OLLAMA_BASE_URL: "http://localhost:11434"
