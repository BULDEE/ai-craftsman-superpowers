# =============================================================================
# Craftsman Quality Gate — Bitbucket Pipelines template
#
# If you already have bitbucket-pipelines.yml, merge this step into your
# existing pipeline definition.
#
# Required variables (set in Repository settings > Pipelines > Variables):
#   BITBUCKET_TOKEN  — App password or OAuth token for PR comments and reports
# =============================================================================

pipelines:
  pull-requests:
    '**':
      - step:
          name: Craftsman Quality Gate
          image: python:3.12-slim
          caches:
            - composer
            - node
          script:
            - apt-get update -qq && apt-get install -qq -y nodejs npm jq
            - if [ -f "composer.json" ]; then composer install --no-interaction --prefer-dist; fi
            - if [ -f "package.json" ]; then npm ci; fi
            - chmod +x ci/craftsman-ci.sh
            - bash ci/craftsman-ci.sh ci --provider bitbucket
          artifacts:
            - craftsman-report.json

  branches:
    main:
      - step:
          name: Craftsman Quality Gate
          image: python:3.12-slim
          caches:
            - composer
            - node
          script:
            - apt-get update -qq && apt-get install -qq -y nodejs npm jq
            - if [ -f "composer.json" ]; then composer install --no-interaction --prefer-dist; fi
            - if [ -f "package.json" ]; then npm ci; fi
            - chmod +x ci/craftsman-ci.sh
            - bash ci/craftsman-ci.sh ci --provider bitbucket
